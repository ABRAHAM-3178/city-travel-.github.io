            // 当前状态
            let currentCity = 'chongqing';
            let currentPlan = '1';
            let currentVersion = 'leisure';
            let weatherData = null;

            async function initWeather() {
                weatherData = await fetchRealWeather(currentCity);
                updateWeatherUI();
            }

            function updateWeatherUI() {
                if (!weatherData) return;
                document.getElementById('weatherDesc').innerText = `${weatherData.now.temp}°C ${weatherData.now.text}`;
                document.getElementById('humidity').innerText = `${weatherData.now.humidity}%`;
                const weeklyDiv = document.getElementById('weeklyForecast');
                weeklyDiv.innerHTML = weatherData.daily.slice(0, 7).map(d => 
                    `<div class="weather-item">${d.fxDate}<br>${d.tempMax}/${d.tempMin}<br>${d.textDay}</div>`
                ).join('');

                const temp = parseInt(weatherData.now.temp);
                const humidity = parseInt(weatherData.now.humidity || '70');
                let sensation = '';
                if (temp < 5) sensation = '❄️ 严寒，羽绒服+帽子手套';
                else if (temp < 10) sensation = '❄️ 寒冷，厚羽绒服';
                else if (temp < 16) sensation = '🍂 偏凉，薄外套+围巾';
                else if (temp < 25) sensation = '🌸 舒适，单衣+外套备用';
                else sensation = '☀️ 较热，短袖+防晒';
                document.getElementById('sensationText').innerText = `当前${temp}°C，湿度${humidity}%，${sensation}`;
                document.getElementById('avoidText').innerText = cityTips[currentCity];
            }

            function updateTime() {
                const now = new Date();
                const beijing = new Date(now.getTime() + (now.getTimezoneOffset() + 480) * 60000);
                document.getElementById('liveTime').innerText = beijing.toLocaleTimeString('zh-CN', { hour12: false });
            }
            setInterval(updateTime, 1000);
            updateTime();

            function renderSchedule() {
                const city = citySpots[currentCity];
                const plan = planData[currentCity][currentPlan][currentVersion];
                if (!plan) return;
                const container = document.getElementById('scheduleContainer');
                container.innerHTML = '';

                plan.days.forEach((day, dayIdx) => {
                    const dayDiv = document.createElement('div');
                    dayDiv.className = 'day-block';
                    let dayHtml = `<div class="day-title">${day.title}</div>`;
                    let dayTotalCost = 0;

                    day.spots.forEach((spotName, spotIdx) => {
                        const spotData = city[spotName];
                        if (!spotData) return;
                        const spotTime = day.times[spotIdx];
                        const duration = spotData.duration[currentVersion];
                        const spotCost = (plan.dayCost && plan.dayCost[dayIdx]) ? plan.dayCost[dayIdx] : 0;
                        dayTotalCost += spotCost;
                        const spotId = `spot-${currentCity}-${currentPlan}-${currentVersion}-${dayIdx}-${spotIdx}`;

                        dayHtml += `
                            <div class="spot-item">
                                <div class="spot-header">
                                    <div class="spot-name">${spotName}<span class="spot-duration">停留 ${duration}</span></div>
                                    <div class="spot-time">${spotTime}</div>
                                </div>
                                <div class="spot-desc"><span><i class="fas fa-tag"></i> 门票参考 ¥${spotCost}</span></div>
                                <div class="spot-tips">
                                    <span><i class="fas fa-tint"></i> ${spotData.water}</span>
                                    <span><i class="fas fa-gift"></i> 特产：${spotData.specialty}</span>
                                </div>
                                <div class="play-tips"><i class="fas fa-lightbulb"></i> ${spotData.playTips.join(' · ')}</div>
                                <div class="nav-buttons">
                                    <a href="https://uri.amap.com/marker?position=106.575,29.557&name=${encodeURIComponent(spotName)}" target="_blank" class="nav-btn"><i class="fas fa-map-marker-alt"></i> 查看位置</a>
                                    <a href="https://uri.amap.com/navigation?to=106.575,29.557,${encodeURIComponent(spotName)}&mode=drive" target="_blank" class="nav-btn"><i class="fas fa-route"></i> 路线规划</a>
                                </div>
                                <button class="detail-toggle" data-target="${spotId}">▼ 查看详情</button>
                                <div id="${spotId}" class="spot-detail">
                                    <div class="detail-section">
                                        <h4>⭐ 真实用户评价</h4>
                                        <div><strong>5条好评：</strong>${spotData.reviews.good.map(r => `<div class="review-item"><i class="fas fa-thumbs-up"></i> ${r}</div>`).join('')}</div>
                                        <div><strong>5条差评：</strong>${spotData.reviews.bad.map(r => `<div class="review-item"><i class="fas fa-thumbs-down"></i> ${r}</div>`).join('')}</div>
                                    </div>
                                    <div class="detail-section">
                                        <h4>🍜 周边美食详细评价</h4>
                                        ${spotData.foodsDetail.map(f => `<div class="food-detail-item"><div><span class="food-name">${f.name}</span> <span class="food-spice">${f.spice}</span> ${f.price}</div><div><strong>👍 好评：</strong>${f.good.join('、')}</div><div><strong>👎 差评：</strong>${f.bad.join('、')}</div></div>`).join('')}
                                    </div>
                                    <div class="detail-section">
                                        <h4>🏨 周边¥100-300酒店推荐</h4>
                                        ${spotData.hotels.map(h => `<div class="hotel-item"><span class="hotel-name">${h.name}</span> · ${h.distance} · ${h.price} · ⭐${h.rating}</div>`).join('')}
                                    </div>
                                </div>
                            </div>
                        `;

                        if (day.meals) {
                            day.meals.forEach(meal => {
                                const [time, desc] = meal.split('·');
                                if (spotTime === time) {
                                    const mealSpot = desc;
                                    const foods = (cityFoods[currentCity] && cityFoods[currentCity][mealSpot]) || [];
                                    if (foods.length > 0) {
                                        dayHtml += `
                                            <div style="margin:1rem 0 0.5rem;">
                                                <div style="font-weight:700; margin-bottom:0.5rem;">🍽️ ${meal} 推荐</div>
                                                <div class="food-row">
                                                    ${foods.slice(0,3).map(f => `<div class="food-card"><div><span class="food-name">${f.name}</span> <span class="food-spice">${f.spice}</span></div><div class="price">${f.price}</div><div class="rec">👍 ${f.recommend}</div></div>`).join('')}
                                                </div>
                                            </div>
                                        `;
                                    }
                                }
                            });
                        }
                    });

                    dayHtml += `<div class="day-total">本日花费合计：¥${dayTotalCost}</div>`;
                    dayDiv.innerHTML = dayHtml;
                    container.appendChild(dayDiv);
                });

                document.getElementById('stepEst').innerText = `步数 ${plan.steps}`;
                document.getElementById('floorEst').innerText = `楼层 ${plan.floors}`;
                document.getElementById('totalTime').innerText = `总时长 ${plan.totalHours}小时`;

                document.querySelectorAll('.detail-toggle').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const targetId = btn.dataset.target;
                        const detailDiv = document.getElementById(targetId);
                        detailDiv.classList.toggle('show');
                        btn.innerText = detailDiv.classList.contains('show') ? '▲ 收起详情' : '▼ 查看详情';
                    });
                });
            }

            // 切换事件
            document.querySelectorAll('.city-tab').forEach(tab => {
                tab.addEventListener('click', async function() {
                    document.querySelectorAll('.city-tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    currentCity = this.dataset.city;
                    await initWeather();
                    renderSchedule();
                });
            });

            document.querySelectorAll('.plan-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.plan-tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    currentPlan = this.dataset.plan;
                    renderSchedule();
                });
            });

            document.querySelectorAll('.version-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.version-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentVersion = this.dataset.version;
                    renderSchedule();
                });
            });

            // 初始化
            (async function init() {
                await initWeather();
                renderSchedule();
                const qrCanvas = document.getElementById('qrCanvas');
                QRCode.toCanvas(window.location.href, { width: 110, margin: 1 }, function(err, canvas) {
                    if (err) { qrCanvas.innerHTML = '<span style="color:red">二维码失败</span>'; return; }
                    qrCanvas.innerHTML = '';
                    canvas.style.width = '100%'; canvas.style.height = '100%'; canvas.style.borderRadius = '8px';
                    qrCanvas.appendChild(canvas);
                });
            })();
        })();
    </script>
